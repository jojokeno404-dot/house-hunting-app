<!DOCTYPE html>
<html>
<head>

<title>House Finder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="/">House Finder</a>

    <div>

      {% if user.is_authenticated %}

      <a class="btn btn-success me-2" href="/add-apartment/">Add Apartment</a>

      <form action="/accounts/logout/" method="post" style="display:inline;">
        {% csrf_token %}
        <button class="btn btn-danger">Logout</button>
      </form>

      {% else %}

      <a class="btn btn-primary me-2" href="/accounts/login/">Login</a>
      <a class="btn btn-warning" href="/register/">Register</a>

      {% endif %}

    </div>

  </div>
</nav>

<div class="container mt-4">

{% block content %}

{% endblock %}

</div>

</body>
</html>
